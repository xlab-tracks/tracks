<!-- @dsCard group="Colors" viewport="700x150" name="Semantic status" subtitle="Success, warning, danger, info — warm-harmonised" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bg-base);font-family:var(--font-sans);padding:20px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .sw{display:flex;flex-direction:column;gap:8px}
  .chip{height:60px;border-radius:var(--radius-sm);border:0.5px solid rgba(255,255,255,.08);display:flex;align-items:flex-end;padding:8px}
  .role{font-size:12px;font-weight:600}
  .n{font-size:11px;color:var(--text-secondary)}
  .h{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums}
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--success)"><span class="role" style="color:#15241a">Success</span></div><span class="n">--success</span><span class="h">#7FA682</span></div>
  <div class="sw"><div class="chip" style="background:var(--warning)"><span class="role" style="color:#2a1f08">Warning</span></div><span class="n">--warning</span><span class="h">#D7A24B</span></div>
  <div class="sw"><div class="chip" style="background:var(--danger)"><span class="role" style="color:#2a110c">Danger</span></div><span class="n">--danger</span><span class="h">#C5705F</span></div>
  <div class="sw"><div class="chip" style="background:var(--info)"><span class="role" style="color:#10211f">Info</span></div><span class="n">--info</span><span class="h">#8FA3A8</span></div>
</div>
</body></html>
