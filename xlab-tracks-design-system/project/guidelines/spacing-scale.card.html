<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bg-base);padding:22px;font-family:var(--font-sans)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .item{display:flex;flex-direction:column;gap:6px;align-items:center}
  .bar{background:var(--accent);border-radius:3px;width:22px}
  .n{font-size:11px;color:var(--text-secondary)}
  .v{font-size:10px;color:var(--text-muted)}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="height:8px"></div><span class="n">2</span><span class="v">8</span></div>
  <div class="item"><div class="bar" style="height:12px"></div><span class="n">3</span><span class="v">12</span></div>
  <div class="item"><div class="bar" style="height:16px"></div><span class="n">4</span><span class="v">16</span></div>
  <div class="item"><div class="bar" style="height:24px"></div><span class="n">6</span><span class="v">24</span></div>
  <div class="item"><div class="bar" style="height:32px"></div><span class="n">8</span><span class="v">32</span></div>
  <div class="item"><div class="bar" style="height:48px"></div><span class="n">12</span><span class="v">48</span></div>
  <div class="item"><div class="bar" style="height:64px"></div><span class="n">16</span><span class="v">64</span></div>
  <div class="item"><div class="bar" style="height:80px"></div><span class="n">20</span><span class="v">80</span></div>
</div>
</body></html>
