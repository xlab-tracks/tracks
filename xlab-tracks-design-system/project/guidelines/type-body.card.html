<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />

  body{margin:0;background:var(--bg-base);padding:22px;font-family:var(--font-sans);color:var(--text-primary)}

<body>
  <p class="lg">Lead paragraph — A wood-fired sauna and a cold plunge. <span class="meta">Body LG · 17/1.7</span></p>

  <p class="cap">Caption / label · 13/1.5 · 500 · sentence case</p>
