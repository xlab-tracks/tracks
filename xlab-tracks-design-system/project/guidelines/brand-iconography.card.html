<!-- @dsCard group="Brand" viewport="700x170" name="Iconography — Tabler" subtitle="Tabler Icons, ~1.75px stroke, line style" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
<style>
  body{margin:0;background:var(--bg-base);font-family:var(--font-sans);padding:22px}
  .grid{display:grid;grid-template-columns:repeat(9,1fr);gap:18px}
  .ic{display:flex;flex-direction:column;align-items:center;gap:7px}
  .ic i{font-size:26px;color:var(--text-primary)}
  .ic span{font-size:10px;color:var(--text-muted)}
  .accent i{color:var(--accent)}
</style></head>
<body>
<div class="grid">
  <div class="ic accent"><i class="ti ti-flame"></i><span>flame</span></div>
  <div class="ic"><i class="ti ti-book-2"></i><span>book-2</span></div>
  <div class="ic"><i class="ti ti-route"></i><span>route</span></div>
  <div class="ic"><i class="ti ti-checkbox"></i><span>checkbox</span></div>
  <div class="ic"><i class="ti ti-bulb"></i><span>bulb</span></div>
  <div class="ic"><i class="ti ti-message-circle"></i><span>message</span></div>
  <div class="ic"><i class="ti ti-chart-line"></i><span>chart-line</span></div>
  <div class="ic"><i class="ti ti-certificate"></i><span>certificate</span></div>
  <div class="ic"><i class="ti ti-player-play"></i><span>play</span></div>
  <div class="ic"><i class="ti ti-clock"></i><span>clock</span></div>
  <div class="ic"><i class="ti ti-users"></i><span>users</span></div>
  <div class="ic"><i class="ti ti-arrow-right"></i><span>arrow-right</span></div>
  <div class="ic"><i class="ti ti-search"></i><span>search</span></div>
  <div class="ic"><i class="ti ti-settings"></i><span>settings</span></div>
  <div class="ic"><i class="ti ti-bookmark"></i><span>bookmark</span></div>
  <div class="ic"><i class="ti ti-lock"></i><span>lock</span></div>
  <div class="ic"><i class="ti ti-notes"></i><span>notes</span></div>
  <div class="ic"><i class="ti ti-star"></i><span>star</span></div>
</div>
</body></html>
