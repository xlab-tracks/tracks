<!-- @dsCard group="Colors" viewport="700x150" name="Brand accents" subtitle="Ember (primary), dusty rose (secondary) & water (cool)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bg-base);font-family:var(--font-sans);padding:20px}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
  .sw{display:flex;flex-direction:column;gap:8px}
  .chip{height:64px;border-radius:var(--radius-sm);border:0.5px solid rgba(255,255,255,.08)}
  .n{font-size:12px;color:var(--text-primary);font-weight:500}
  .h{font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums}
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--ember-600)"></div><span class="n">ember-600</span><span class="h">#C9703D</span></div>
  <div class="sw"><div class="chip" style="background:var(--ember-500)"></div><span class="n">ember-500 ●</span><span class="h">#E1854F</span></div>
  <div class="sw"><div class="chip" style="background:var(--ember-300)"></div><span class="n">ember-300</span><span class="h">#F1B189</span></div>
  <div class="sw"><div class="chip" style="background:var(--rose-400)"></div><span class="n">rose-400</span><span class="h">#CD8A7F</span></div>
  <div class="sw"><div class="chip" style="background:var(--water-deep)"></div><span class="n">water-deep</span><span class="h">#1D383D</span></div>
  <div class="sw"><div class="chip" style="background:var(--water-shallow)"></div><span class="n">water-shallow</span><span class="h">#7FB0AE</span></div>
</div>
</body></html>
