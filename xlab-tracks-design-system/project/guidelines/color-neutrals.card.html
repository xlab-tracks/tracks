<!-- @dsCard group="Colors" viewport="700x150" name="Stone neutrals" subtitle="Warm-grey ramp — backgrounds, surfaces, text" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bg-base);font-family:var(--font-sans);padding:20px}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .sw{display:flex;flex-direction:column;gap:7px}
  .chip{height:60px;border-radius:var(--radius-sm);border:0.5px solid rgba(255,255,255,.08)}
  .n{font-size:11px;color:var(--text-primary);font-weight:500}
  .h{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums}
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--stone-950)"></div><span class="n">950</span><span class="h">#171211</span></div>
  <div class="sw"><div class="chip" style="background:var(--stone-900)"></div><span class="n">900</span><span class="h">#201A19</span></div>
  <div class="sw"><div class="chip" style="background:var(--stone-850)"></div><span class="n">850</span><span class="h">#2B2321</span></div>
  <div class="sw"><div class="chip" style="background:var(--stone-650)"></div><span class="n">650</span><span class="h">#574D4B</span></div>
  <div class="sw"><div class="chip" style="background:var(--stone-400)"></div><span class="n">400</span><span class="h">#A69A98</span></div>
  <div class="sw"><div class="chip" style="background:var(--stone-200)"></div><span class="n">200</span><span class="h">#CFC8C4</span></div>
  <div class="sw"><div class="chip" style="background:var(--stone-100)"></div><span class="n">100</span><span class="h">#ECE5E3</span></div>
</div>
</body></html>
