# Netlify build & deploy for Tracks (Next.js 16).
# Netlify Database (GA) applies migrations from netlify/database/migrations on
# each deploy, so the build does NOT run migrations. Prisma is the runtime query
# client, reading the injected NETLIFY_DB_URL.
[build]
  command = "prisma generate && next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
