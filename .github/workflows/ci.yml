name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Hard gates: types and the full vitest suite (content tripwires,
      # exercise/action sanitizers, the inspection-game engine, etc.).
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
